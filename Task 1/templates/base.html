<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}COSC2980 Group 7 Forum{% endblock %}</title>
<style>
  :root {
    --bg: #1e1e1e;
    --card: #252526;
    --border: #3c3c3c;
    --accent: #58a6ff;
    --accent-deep: #1f6feb;
    --text: #d4d4d4;
    --muted: #8b949e;
    --error: #f85149;
    --mono: ui-monospace, SFMono-Regular, Consolas, "JetBrains Mono", "Cascadia Code", monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
  }
  nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
  }
  nav .brand { font-family: var(--mono); font-weight: 700; font-size: 18px; color: var(--accent); text-decoration: none; }
  nav .nav-right { display: flex; align-items: center; gap: 16px; }
  nav .nav-right a { display: flex; align-items: center; gap: 8px; }
  nav a { font-family: var(--mono); color: var(--muted); text-decoration: none; font-size: 12px; letter-spacing: 0.02em; }
  nav a:hover { color: var(--text); text-decoration: underline; }
  .container { max-width: 640px; margin: 24px auto; padding: 0 16px; }
  h2 { font-family: var(--mono); font-weight: 700; font-size: 20px; color: var(--text); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-bottom: 24px; }
  .avatar-sm { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
  .avatar-lg { width: 64px; height: 64px; max-width: 120px; max-height: 120px; border-radius: 50%; object-fit: cover; }
  .post-meta { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; color: var(--muted); }
  .post-meta a { color: var(--muted); font-weight: 600; }
  .post-meta a:hover { color: var(--text); }
  .post h3 { font-family: var(--mono); font-weight: 700; margin: 8px 0 4px; font-size: 18px; color: var(--text); }
  .post p.message { margin: 4px 0; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .post-image { max-width: 100%; border: 1px solid var(--border); border-radius: 4px; margin-top: 8px; display: block; }
  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 24px 16px; }
  label { display: block; font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 4px; margin-top: 12px; }
  input[type=text], input[type=password], input[type=file], textarea {
    width: 100%; padding: 8px 12px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 14px; font-family: inherit;
  }
  input[type=text]:focus, input[type=password]:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }
  input[type=file] { color: var(--muted); }
  textarea { min-height: 90px; resize: vertical; }
  .btn {
    display: inline-block; background: var(--accent); color: var(--bg); border: none;
    padding: 8px 24px; border-radius: 4px; font-family: var(--mono); font-weight: 600; font-size: 14px;
    cursor: pointer; margin-top: 16px;
    transition: background 0.15s cubic-bezier(0.4,0,0.2,1), color 0.15s cubic-bezier(0.4,0,0.2,1);
  }
  .btn:hover { background: var(--accent-deep); color: #ffffff; }
  .btn:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }
  .btn-link { color: var(--accent); text-decoration: none; font-family: var(--mono); font-weight: 600; font-size: 12px; }
  .btn-link:hover { text-decoration: underline; }
  .error { background: rgba(248, 81, 73, 0.1); color: var(--error); padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
  .auth-card { max-width: 360px; margin: 60px auto; }
  .auth-card h1 { font-family: var(--mono); text-align: center; color: var(--accent); font-size: 20px; letter-spacing: -0.01em; margin-bottom: 20px; }
  .auth-card .btn { width: 100%; text-align: center; }
  .auth-footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); }
  @media (prefers-reduced-motion: reduce) {
    .btn { transition: none; }
  }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
